<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết điểm danh</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .detail-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .list-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        .list-box {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            background: #f8fafc;
            min-height: 120px;
        }

        .list-title {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .name-item {
            padding: 6px 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .name-item:last-child {
            border-bottom: none;
        }

        .present-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .present-item:last-child {
            border-bottom: none;
        }

        .present-item img {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #e2e8f0;
        }

        .summary-line {
            margin-top: 10px;
            font-weight: 600;
        }

        
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <button class="btn btn-secondary" onclick="window.location.href='/dashboard'"
                    style="width: auto; padding: 8px 20px;">
                    ← Quay lại
                </button>
            </div>
            <h1>Chi tiết điểm danh</h1>
            <div class="user-info">
                <span id="username">User</span>
            </div>
        </div>

        <div class="detail-section">
            <div class="detail-header">
                <div id="sessionInfo"></div>
                <div id="sessionSummary"></div>
            </div>

            <div class="list-grid">
                <div class="list-box">
                    <div class="list-title">Có mặt</div>
                    <div id="presentList"></div>
                </div>
                <div class="list-box">
                    <div class="list-title">Vắng</div>
                    <div id="absentList"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const sessionId = "{{ session_id }}";
        function renderNames(containerId, names) {
            const container = document.getElementById(containerId);
            if (!names || names.length === 0) {
                container.innerHTML = '<div>Không có</div>';
                return;
            }
            container.innerHTML = names.map(name => `<div class="name-item">${name}</div>`).join('');
        }

        function renderPresent(containerId, faces) {
            const container = document.getElementById(containerId);
            if (!faces || faces.length === 0) {
                container.innerHTML = '<div>Không có</div>';
                return;
            }
            container.innerHTML = faces.map(face => {
                const name = face.name || '';
                const image = face.face_image ? `data:image/jpeg;base64,${face.face_image}` : '';
                const imageHtml = image ? `<img src="${image}" alt="${name}">` : '<div style="width:44px;height:44px;border-radius:8px;background:#e2e8f0;"></div>';
                return `<div class="present-item">${imageHtml}<div>${name}</div></div>`;
            }).join('');
        }

        function loadDetail() {
            fetch(`/api/attendance-session-detail?session_id=${encodeURIComponent(sessionId)}`)
                .then(response => response.json())
                .then(data => {
                    if (!data.success) {
                        document.getElementById('sessionInfo').innerText = 'Không tải được dữ liệu';
                        return;
                    }

                    const s = data.session;
                    const start = new Date(s.start_time);
                    const end = new Date(s.end_time);
                    const startStr = isNaN(start.getTime()) ? '' : `${start.toLocaleDateString('vi-VN')} ${start.toLocaleTimeString('vi-VN')}`;
                    const endStr = isNaN(end.getTime()) ? '' : `${end.toLocaleDateString('vi-VN')} ${end.toLocaleTimeString('vi-VN')}`;
                    const modeText = s.attendance_type === 'out' ? 'RA' : 'VÀO';

                    document.getElementById('sessionInfo').innerHTML = `
                        <div><strong>Lớp:</strong> ${s.class_name}</div>
                        <div><strong>Chế độ:</strong> ${modeText}</div>
                        <div><strong>Bắt đầu:</strong> ${startStr}</div>
                        <div><strong>Kết thúc:</strong> ${endStr}</div>
                    `;
                    document.getElementById('sessionSummary').innerHTML = `
                        <div class="summary-line">Có mặt: ${s.present}/${s.total}</div>
                        <div class="summary-line">Vắng: ${s.absent}/${s.total}</div>
                    `;

                    renderPresent('presentList', data.present_faces || []);
                    renderNames('absentList', data.absent_names);
                    
                })
                .catch(() => {
                    document.getElementById('sessionInfo').innerText = 'Không tải được dữ liệu';
                });
        }

        window.addEventListener('DOMContentLoaded', loadDetail);
    </script>
</body>

</html>
