<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết điểm danh</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .detail-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .list-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        .list-box {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            background: #f8fafc;
            min-height: 120px;
        }

        .list-title {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .name-item {
            padding: 6px 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .name-item:last-child {
            border-bottom: none;
        }

        .summary-line {
            margin-top: 10px;
            font-weight: 600;
        }

        .students-section {
            margin-top: 20px;
        }

        .students-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .students-table th,
        .students-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        .students-table th {
            background: var(--light);
            color: var(--dark);
            font-weight: 600;
        }

        .students-table tr:hover {
            background: #f8fafc;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <button class="btn btn-secondary" onclick="window.location.href='/dashboard'"
                    style="width: auto; padding: 8px 20px;">
                    ← Quay lại
                </button>
            </div>
            <h1>📋 Chi tiết điểm danh</h1>
            <div class="user-info">
                <span id="username">User</span>
            </div>
        </div>

        <div class="detail-section">
            <div class="detail-header">
                <div id="sessionInfo"></div>
                <div id="sessionSummary"></div>
            </div>

            <div class="list-grid">
                <div class="list-box">
                    <div class="list-title">Có mặt</div>
                    <div id="presentList"></div>
                </div>
                <div class="list-box">
                    <div class="list-title">Vắng</div>
                    <div id="absentList"></div>
                </div>
            </div>

            <div class="students-section">
                <div class="list-title">Danh sách sinh viên</div>
                <div id="studentsContent"></div>
            </div>
        </div>
    </div>

    <script>
        const sessionId = "{{ session_id }}";
        let currentClassName = '';

        function renderNames(containerId, names) {
            const container = document.getElementById(containerId);
            if (!names || names.length === 0) {
                container.innerHTML = '<div>Không có</div>';
                return;
            }
            container.innerHTML = names.map(name => `<div class="name-item">${name}</div>`).join('');
        }

        function loadDetail() {
            fetch(`/api/attendance-session-detail?session_id=${encodeURIComponent(sessionId)}`)
                .then(response => response.json())
                .then(data => {
                    if (!data.success) {
                        document.getElementById('sessionInfo').innerText = 'Không tải được dữ liệu';
                        return;
                    }

                    const s = data.session;
                    const start = new Date(s.start_time);
                    const end = new Date(s.end_time);
                    const startStr = isNaN(start.getTime()) ? '' : `${start.toLocaleDateString('vi-VN')} ${start.toLocaleTimeString('vi-VN')}`;
                    const endStr = isNaN(end.getTime()) ? '' : `${end.toLocaleDateString('vi-VN')} ${end.toLocaleTimeString('vi-VN')}`;
                    const modeText = s.attendance_type === 'out' ? 'RA' : 'VÀO';

                    document.getElementById('sessionInfo').innerHTML = `
                        <div><strong>Lớp:</strong> ${s.class_name}</div>
                        <div><strong>Chế độ:</strong> ${modeText}</div>
                        <div><strong>Bắt đầu:</strong> ${startStr}</div>
                        <div><strong>Kết thúc:</strong> ${endStr}</div>
                    `;
                    document.getElementById('sessionSummary').innerHTML = `
                        <div class="summary-line">Có mặt: ${s.present}/${s.total}</div>
                        <div class="summary-line">Vắng: ${s.absent}/${s.total}</div>
                    `;

                    renderNames('presentList', data.present_names);
                    renderNames('absentList', data.absent_names);
                    currentClassName = s.class_name;
                    loadStudents();
                })
                .catch(() => {
                    document.getElementById('sessionInfo').innerText = 'Không tải được dữ liệu';
                });
        }

        function loadStudents() {
            const container = document.getElementById('studentsContent');
            if (!currentClassName) {
                container.innerHTML = '';
                return;
            }

            fetch(`/api/class-students?class_name=${encodeURIComponent(currentClassName)}`)
                .then(response => response.json())
                .then(data => {
                    if (!data.success) {
                        container.innerHTML = '<div>Không tải được danh sách sinh viên</div>';
                        return;
                    }

                    if (data.students.length === 0) {
                        container.innerHTML = '<div>Chưa có sinh viên</div>';
                        return;
                    }

                    let html = '<table class="students-table">';
                    html += '<thead><tr><th>STT</th><th>Tên</th><th></th></tr></thead>';
                    html += '<tbody>';
                    data.students.forEach((student, index) => {
                        html += `<tr>
                            <td>${index + 1}</td>
                            <td>${student.name}</td>
                            <td>
                                <button class="btn btn-secondary" onclick="editStudent('${student.id}', '${student.name.replace(/'/g, "\\'")}')">Sửa</button>
                                <button class="btn btn-danger" onclick="deleteStudent('${student.id}')">Xóa</button>
                            </td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                })
                .catch(() => {
                    container.innerHTML = '<div>Không tải được danh sách sinh viên</div>';
                });
        }

        function editStudent(studentId, currentName) {
            const newName = prompt('Nhập tên mới', currentName || '');
            if (!newName) {
                return;
            }

            fetch(`/api/class-students/${encodeURIComponent(studentId)}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: newName })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        loadStudents();
                    } else {
                        alert('Sửa thất bại');
                    }
                })
                .catch(() => {
                    alert('Sửa thất bại');
                });
        }

        function deleteStudent(studentId) {
            if (!confirm('Xóa sinh viên này?')) {
                return;
            }

            fetch(`/api/class-students/${encodeURIComponent(studentId)}`, {
                method: 'DELETE'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        loadStudents();
                    } else {
                        alert('Xóa thất bại');
                    }
                })
                .catch(() => {
                    alert('Xóa thất bại');
                });
        }

        window.addEventListener('DOMContentLoaded', loadDetail);
    </script>
</body>

</html>
