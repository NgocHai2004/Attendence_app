<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống điểm danh HAUI</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/png" href="/static/css/brand.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Floating Elements for Visual Effect -->
    <div style="position: fixed; top: 10%; left: 5%; width: 80px; height: 80px; background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%); border-radius: 50%; animation: float 6s ease-in-out infinite;"></div>
    <div style="position: fixed; bottom: 20%; right: 10%; width: 120px; height: 120px; background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, transparent 70%); border-radius: 50%; animation: float 8s ease-in-out infinite; animation-delay: -2s;"></div>
    <div style="position: fixed; top: 40%; right: 5%; width: 60px; height: 60px; background: radial-gradient(circle, rgba(236, 72, 153, 0.15) 0%, transparent 70%); border-radius: 50%; animation: float 5s ease-in-out infinite; animation-delay: -1s;"></div>

    <div class="auth-container">
        <!-- Top Gradient Line is in CSS -->
        
        <div class="auth-header">
            <div class="logo-container">
                <img src="/static/css/brand.png" alt="HAUI Logo">
            </div>
            <div class="university-name">ĐẠI HỌC CÔNG NGHIỆP HÀ NỘI</div>
            <div class="system-name">✨ ONE HAUI ✨</div>
            <div style="margin-top: 25px;">
                <h1 style="font-size: 28px; margin-bottom: 8px;">Đăng nhập</h1>
                <p>Chào mừng bạn quay trở lại hệ thống</p>
            </div>
        </div>

        <div id="alertContainer"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">
                    <span style="display: flex; align-items: center; gap: 8px;">
                        📧 Email
                    </span>
                </label>
                <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">
                    <span style="display: flex; align-items: center; gap: 8px;">
                        🔒 Mật khẩu
                    </span>
                </label>
                <div class="password-field">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required
                        style="padding-right: 50px;">
                    <button type="button" onclick="togglePassword()" id="togglePwdBtn" class="password-toggle">
                        👁️
                    </button>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: var(--gray);">
                    <input type="checkbox" style="accent-color: var(--primary); width: 16px; height: 16px;">
                    Ghi nhớ đăng nhập
                </label>
                <a href="#" style="color: var(--primary); font-size: 14px; text-decoration: none; font-weight: 600;">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn btn-primary">
                🚀 Đăng nhập
            </button>
        </form>

        <div class="divider"></div>

        <div class="auth-footer" style="border-top: none; padding-top: 0;">
            Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
        </div>

        <div style="text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #e2e8f0;">
            <p style="font-size: 12px; color: var(--gray);">
                © 2024 Đại học Công nghiệp Hà Nội<br>
                <span style="font-size: 11px;">Hệ thống điểm danh thông minh bằng nhận diện khuôn mặt</span>
            </p>
        </div>
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const btn = document.getElementById('togglePwdBtn');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                btn.textContent = '🙈';
            } else {
                pwd.type = 'password';
                btn.textContent = '👁️';
            }
        }
    </script>
    <script src="/static/js/auth.js"></script>
</body>

</html>
