<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Hệ thống điểm danh HAUI</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/png" href="/static/css/brand.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Floating Elements for Visual Effect -->
    <div style="position: fixed; top: 15%; left: 8%; width: 100px; height: 100px; background: radial-gradient(circle, rgba(16, 185, 129, 0.2) 0%, transparent 70%); border-radius: 50%; animation: float 7s ease-in-out infinite;"></div>
    <div style="position: fixed; bottom: 15%; right: 8%; width: 90px; height: 90px; background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%); border-radius: 50%; animation: float 6s ease-in-out infinite; animation-delay: -3s;"></div>
    <div style="position: fixed; top: 50%; left: 3%; width: 70px; height: 70px; background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, transparent 70%); border-radius: 50%; animation: float 5s ease-in-out infinite; animation-delay: -1.5s;"></div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="logo-container">
                <img src="/static/css/brand.png" alt="HAUI Logo">
            </div>
            <div class="university-name">ĐẠI HỌC CÔNG NGHIỆP HÀ NỘI</div>
            <div class="system-name">✨ ONE HAUI ✨</div>
            <div style="margin-top: 25px;">
                <h1 style="font-size: 28px; margin-bottom: 8px;">Tạo tài khoản</h1>
                <p>Đăng ký để bắt đầu sử dụng hệ thống</p>
            </div>
        </div>

        <div id="alertContainer"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">
                    <span style="display: flex; align-items: center; gap: 8px;">
                        👤 Tên người dùng
                    </span>
                </label>
                <input type="text" id="username" class="form-control" placeholder="Nhập tên của bạn" required>
            </div>

            <div class="form-group">
                <label for="email">
                    <span style="display: flex; align-items: center; gap: 8px;">
                        📧 Email
                    </span>
                </label>
                <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">
                    <span style="display: flex; align-items: center; gap: 8px;">
                        🔒 Mật khẩu
                    </span>
                </label>
                <div class="password-field">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required
                        style="padding-right: 50px;">
                    <button type="button" onclick="togglePassword('password', 'togglePwdBtn1')" id="togglePwdBtn1" class="password-toggle">
                        👁️
                    </button>
                </div>
                <small style="color: var(--gray); font-size: 12px; margin-top: 5px; display: block;">
                    Tối thiểu 8 ký tự, bao gồm chữ và số
                </small>
            </div>

            <div class="form-group">
                <label for="confirmPassword">
                    <span style="display: flex; align-items: center; gap: 8px;">
                        🔐 Xác nhận mật khẩu
                    </span>
                </label>
                <div class="password-field">
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required
                        style="padding-right: 50px;">
                    <button type="button" onclick="togglePassword('confirmPassword', 'togglePwdBtn2')" id="togglePwdBtn2" class="password-toggle">
                        👁️
                    </button>
                </div>
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 13px; color: var(--gray); line-height: 1.5;">
                    <input type="checkbox" required style="accent-color: var(--primary); width: 18px; height: 18px; margin-top: 2px;">
                    <span>Tôi đồng ý với <a href="#" style="color: var(--primary); font-weight: 600;">Điều khoản sử dụng</a> và <a href="#" style="color: var(--primary); font-weight: 600;">Chính sách bảo mật</a> của hệ thống</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary">
                ✨ Đăng ký tài khoản
            </button>
        </form>

        <div class="divider"></div>

        <div class="auth-footer" style="border-top: none; padding-top: 0;">
            Đã có tài khoản? <a href="/login">Đăng nhập ngay</a>
        </div>

        <div style="text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #e2e8f0;">
            <p style="font-size: 12px; color: var(--gray);">
                © 2024 Đại học Công nghiệp Hà Nội<br>
                <span style="font-size: 11px;">Hệ thống điểm danh thông minh bằng nhận diện khuôn mặt</span>
            </p>
        </div>
    </div>

    <script>
        function togglePassword(inputId, btnId) {
            const pwd = document.getElementById(inputId);
            const btn = document.getElementById(btnId);
            if (pwd.type === 'password') {
                pwd.type = 'text';
                btn.textContent = '🙈';
            } else {
                pwd.type = 'password';
                btn.textContent = '👁️';
            }
        }
    </script>
    <script src="/static/js/auth.js"></script>
</body>

</html>
